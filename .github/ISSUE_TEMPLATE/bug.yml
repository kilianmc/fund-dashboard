name: Bug report
description: Report a defect in the fund dashboard.
title: 'fix: '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include console errors if any.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser/OS, standalone vs. loaded in portfolio-shell, Node version.
      placeholder: |
        - Browser/OS:
        - Context: standalone (`npm run dev`) / via portfolio-shell host
        - Node:
    validations:
      required: true
